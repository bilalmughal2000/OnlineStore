# Nginx reverse proxy for the VPS. Adjust server_name and SSL paths.
# Storefront -> :3000 (Next.js SSR), API -> :4000, Admin -> static files.

# Customer storefront + API
server {
  listen 80;
  server_name store.pk www.store.pk;

  # Allow admin image uploads (Multer accepts up to ~5MB) — default is 1MB (413).
  client_max_body_size 12M;

  # Storefront's own Next.js API route (on-demand revalidation) must hit :3000,
  # not the Express API. Keep this BEFORE the /api/ block. Set STOREFRONT_URL to
  # http://127.0.0.1:3000 (or https://store.pk) so the API can reach it.
  location = /api/revalidate {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Backend API
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Locally-uploaded images (dev/fallback). With Cloudinary configured these are
  # served from the CDN instead; harmless to keep.
  location /uploads/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
  }

  # Next.js storefront
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Admin panel (static SPA build served directly)
server {
  listen 80;
  server_name admin.store.pk;
  root /var/www/store/apps/admin/dist;
  index index.html;

  # Admin uploads product/banner images through the API.
  client_max_body_size 12M;

  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
