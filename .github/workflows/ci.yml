name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clothing_store
        ports: ['3306:3306']
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -proot"
          --health-interval 5s --health-timeout 5s --health-retries 15
    env:
      DATABASE_URL: mysql://root:root@localhost:3306/clothing_store?connection_limit=10&pool_timeout=20
      DIRECT_DATABASE_URL: mysql://root:root@localhost:3306/clothing_store
      JWT_ACCESS_SECRET: ci-access
      JWT_REFRESH_SECRET: ci-refresh
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Prisma scripts load ../../.env via dotenv-cli — provide it from CI env.
      - name: Write .env
        run: printf 'DATABASE_URL=%s\nDIRECT_DATABASE_URL=%s\n' "$DATABASE_URL" "$DIRECT_DATABASE_URL" > .env
      - run: npm run build -w @store/shared-types
      - run: npm run generate -w @store/database
      - name: Apply migrations
        run: npm run migrate:deploy -w @store/database
      - name: Typecheck API
        run: npm run typecheck -w @store/api
      - name: Build all
        run: npm run build
